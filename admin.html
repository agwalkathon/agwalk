<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walkathon 2026 — Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; }
    .header { background: #1a1a2e; color: white; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 22px; }
    .tabs { display: flex; gap: 0; background: white; border-bottom: 2px solid #eee; padding: 0 24px; }
    .tab { padding: 14px 20px; cursor: pointer; font-size: 14px; color: #666; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tab.active { color: #FC4C02; border-bottom-color: #FC4C02; font-weight: 500; }
    .content { padding: 24px; }
    .table-wrap { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8f8f8; padding: 12px 16px; text-align: left; font-size: 13px; color: #666; border-bottom: 1px solid #eee; }
    td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .badge-clean    { background: #e8f5e9; color: #2e7d32; }
    .badge-flagged  { background: #ffebee; color: #c62828; }
    .badge-walk { background: #e8f5e9; color: #2e7d32; }
    .badge-run  { background: #e3f2fd; color: #1565c0; }
    .btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-approve { background: #e8f5e9; color: #2e7d32; }
    .btn-reject  { background: #ffebee; color: #c62828; }
    .flag-reason { font-size: 12px; color: #e53935; margin-top: 4px; }
    .stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { background: white; border-radius: 12px; padding: 16px 20px; flex: 1; min-width: 140px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .stat-card .value { font-size: 24px; font-weight: 600; }
    .stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
    .red { color: #e53935; }
    .green { color: #2e7d32; }
    .loading { text-align: center; padding: 48px; color: #999; }
  </style>
</head>
<body>

<div class="header">
  <h1>🛡️ Walkathon Admin Panel</h1>
  <span style="font-size:13px;opacity:0.6">Restricted access</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('flagged')">🚩 Flagged activities</div>
  <div class="tab" onclick="switchTab('all')">📋 All activities</div>
  <div class="tab" onclick="switchTab('participants')">👥 Participants</div>
</div>

<div class="content">
  <div class="stats">
    <div class="stat-card"><div class="value green" id="stat-clean">—</div><div class="label">Clean activities</div></div>
    <div class="stat-card"><div class="value red" id="stat-flagged">—</div><div class="label">Flagged activities</div></div>
    <div class="stat-card"><div class="value" id="stat-participants">—</div><div class="label">Registered participants</div></div>
    <div class="stat-card"><div class="value" id="stat-total-km">—</div><div class="label">Total km</div></div>
  </div>

  <div class="table-wrap" id="table-container">
    <table>
      <tbody><tr><td class="loading">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
  const SUPABASE_URL  = 'https://jhdgkncpkrttvemvwukc.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpoZGdrbmNwa3J0dHZlbXZ3dWtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzgyNjMsImV4cCI6MjA5NzI1NDI2M30.d7mvXOYDq5G4aqs1Mbc6HFNgTBlQk4B6ah0eahE_yZE';

  let currentTab = 'flagged';
  let nameMap = {};

  function fmtDate(d) { return new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }); }
  function fmtDuration(s) { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h>0?`${h}h ${m}m`:`${m}m`; }
  function fmtSpeed(ms) { return ms ? (ms*3.6).toFixed(1)+' km/h' : '—'; }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', ['flagged','all','participants'][i] === tab);
    });
    loadData();
  }

  async function loadData() {
    document.getElementById('table-container').innerHTML =
      '<table><tbody><tr><td class="loading">Loading...</td></tr></tbody></table>';

    const [actRes, partRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/activities?order=activity_date.desc`, {
        headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
      }),
      fetch(`${SUPABASE_URL}/rest/v1/participants?select=strava_athlete_id,name,email,registered_at`, {
        headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
      })
    ]);

    const activities   = await actRes.json();
    const participants = await partRes.json();

    nameMap = {};
    participants.forEach(p => nameMap[p.strava_athlete_id] = p.name);

    // Update stats
    const clean   = activities.filter(a => !a.is_flagged).length;
    const flagged = activities.filter(a =>  a.is_flagged).length;
    const totalKm = activities.reduce((s,a) => s + (a.distance_meters||0), 0) / 1000;
    document.getElementById('stat-clean').textContent        = clean;
    document.getElementById('stat-flagged').textContent      = flagged;
    document.getElementById('stat-participants').textContent = participants.length;
    document.getElementById('stat-total-km').textContent     = totalKm.toFixed(1) + ' km';

    if (currentTab === 'flagged')      renderFlagged(activities.filter(a => a.is_flagged));
    else if (currentTab === 'all')     renderAll(activities);
    else if (currentTab === 'participants') renderParticipants(participants);
  }

  function renderFlagged(activities) {
    if (!activities.length) {
      document.getElementById('table-container').innerHTML =
        '<table><tbody><tr><td class="loading">🎉 No flagged activities!</td></tr></tbody></table>';
      return;
    }
    document.getElementById('table-container').innerHTML = `
      <table>
        <thead><tr>
          <th>Participant</th><th>Activity</th><th>Type</th><th>Date</th>
          <th>Distance</th><th>Avg Speed</th><th>Flag reason</th><th>Action</th>
        </tr></thead>
        <tbody>${activities.map(a => `
          <tr id="row-${a.id}">
            <td>${nameMap[a.strava_athlete_id] || 'Unknown'}</td>
            <td>${a.activity_name || '—'}</td>
            <td><span class="badge badge-${(a.sport_type||'').toLowerCase()}">${a.sport_type||'—'}</span></td>
            <td>${fmtDate(a.activity_date)}</td>
            <td>${a.distance_meters ? (a.distance_meters/1000).toFixed(2)+' km' : '—'}</td>
            <td>${fmtSpeed(a.avg_speed)}</td>
            <td><span style="color:#e53935;font-size:13px">${a.flag_reason || '—'}</span></td>
            <td style="display:flex;gap:6px">
              <button class="btn btn-approve" onclick="clearFlag(${a.id})">✅ Clear</button>
              <button class="btn btn-reject"  onclick="deleteActivity(${a.id})">🗑️ Delete</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }

  function renderAll(activities) {
    document.getElementById('table-container').innerHTML = `
      <table>
        <thead><tr>
          <th>#</th><th>Participant</th><th>Activity</th><th>Type</th>
          <th>Date</th><th>Distance</th><th>Duration</th><th>Avg Speed</th><th>Status</th>
        </tr></thead>
        <tbody>${activities.map((a,i) => `
          <tr>
            <td>${i+1}</td>
            <td>${nameMap[a.strava_athlete_id] || 'Unknown'}</td>
            <td>${a.activity_name || '—'}</td>
            <td><span class="badge badge-${(a.sport_type||'').toLowerCase()}">${a.sport_type||'—'}</span></td>
            <td>${fmtDate(a.activity_date)}</td>
            <td>${a.distance_meters ? (a.distance_meters/1000).toFixed(2)+' km' : '—'}</td>
            <td>${a.moving_time_seconds ? fmtDuration(a.moving_time_seconds) : '—'}</td>
            <td>${fmtSpeed(a.avg_speed)}</td>
            <td><span class="badge ${a.is_flagged ? 'badge-flagged' : 'badge-clean'}">${a.is_flagged ? '🚩 Flagged' : '✅ Clean'}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }

  function renderParticipants(participants) {
    document.getElementById('table-container').innerHTML = `
      <table>
        <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Registered</th><th>Athlete ID</th></tr></thead>
        <tbody>${participants.map((p,i) => `
          <tr>
            <td>${i+1}</td>
            <td>${p.name || '—'}</td>
            <td>${p.email || '—'}</td>
            <td>${fmtDate(p.registered_at)}</td>
            <td style="font-family:monospace;font-size:13px">${p.strava_athlete_id}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }

  async function clearFlag(id) {
    await fetch(`${SUPABASE_URL}/rest/v1/activities?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        apikey: SUPABASE_ANON,
        Authorization: `Bearer ${SUPABASE_ANON}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ is_flagged: false, flag_reason: 'Manually cleared by admin' })
    });
    document.getElementById(`row-${id}`).remove();
  }

  async function deleteActivity(id) {
    if (!confirm('Delete this activity permanently?')) return;
    await fetch(`${SUPABASE_URL}/rest/v1/activities?id=eq.${id}`, {
      method: 'DELETE',
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
    });
    document.getElementById(`row-${id}`).remove();
  }

  loadData();
</script>
</body>
</html>
