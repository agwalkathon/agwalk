<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walkathon 2026 — Participants</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; }
    .header { background: #1a1a2e; color: white; padding: 16px 28px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; font-weight: 500; }
    .back-btn { color: white; text-decoration: none; font-size: 13px; opacity: 0.7; }
    .back-btn:hover { opacity: 1; }
    .toolbar { background: white; border-bottom: 1px solid #eee; padding: 12px 28px; display: flex; gap: 12px; align-items: center; }
    .search-box { padding: 8px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; width: 260px; }
    .search-box:focus { outline: none; border-color: #FC4C02; }
    .count { font-size: 13px; color: #999; margin-left: auto; }
    .content { padding: 24px 28px; }
    .table-wrap { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8f8f8; padding: 12px 16px; text-align: left; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #eee; }
    td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #f5f5f5; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .athlete-link { color: #FC4C02; text-decoration: none; font-weight: 500; }
    .athlete-link:hover { text-decoration: underline; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
    .badge-active { background: #e8f5e9; color: #2e7d32; }
    .badge-none   { background: #f5f5f5; color: #999; }
    .loading { text-align: center; padding: 48px; color: #bbb; }
    .mono { font-family: monospace; font-size: 12px; color: #999; }
  </style>
</head>
<body>

<div class="header">
  <h1>👥 Participants</h1>
  <a href="admin.html" class="back-btn">← Back to dashboard</a>
</div>

<div class="toolbar">
  <input class="search-box" type="text" id="search" placeholder="Search by name or email..." oninput="filterTable()">
  <span class="count" id="count"></span>
</div>

<div class="content">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Email</th>
          <th>Strava profile</th>
          <th>Registered</th>
          <th>Activities</th>
          <th>Total distance</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="participants-body">
        <tr><td colspan="8" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  // ── Auth guard ───────────────────────────────────────────────
  const session = JSON.parse(sessionStorage.getItem('wk_admin') || '{}');
  if (!session.loggedIn || session.expires < Date.now()) {
    window.location.href = 'admin-login.html';
  }

  const SUPABASE_URL  = 'https://jhdgkncpkrttvemvwukc.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpoZGdrbmNwa3J0dHZlbXZ3dWtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzgyNjMsImV4cCI6MjA5NzI1NDI2M30.d7mvXOYDq5G4aqs1Mbc6HFNgTBlQk4B6ah0eahE_yZE';
  const HEADERS = { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` };

  let allRows = [];

  function fmtDate(d) {
    return new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  }

  function filterTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = allRows.filter(r =>
      r.name?.toLowerCase().includes(q) || r.email?.toLowerCase().includes(q)
    );
    document.getElementById('count').textContent = `${filtered.length} of ${allRows.length} participants`;
    renderRows(filtered);
  }

  function renderRows(rows) {
    document.getElementById('participants-body').innerHTML = rows.map((p, i) => `
      <tr>
        <td>${i + 1}</td>
        <td><strong>${p.name || '—'}</strong></td>
        <td>${p.email || '—'}</td>
        <td>
          <a href="https://www.strava.com/athletes/${p.strava_athlete_id}"
             target="_blank" class="athlete-link">
            View on Strava ↗
          </a>
        </td>
        <td>${fmtDate(p.registered_at)}</td>
        <td>${p.activity_count || 0}</td>
        <td>${p.total_distance ? (p.total_distance/1000).toFixed(2)+' km' : '—'}</td>
        <td>
          <span class="badge ${p.activity_count > 0 ? 'badge-active' : 'badge-none'}">
            ${p.activity_count > 0 ? '✅ Active' : 'No activities'}
          </span>
        </td>
      </tr>`).join('');
  }

  async function loadParticipants() {
    const [partRes, actRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/participants?select=strava_athlete_id,name,email,registered_at&order=registered_at.desc`, { headers: HEADERS }),
      fetch(`${SUPABASE_URL}/rest/v1/activities?select=strava_athlete_id,distance_meters`, { headers: HEADERS })
    ]);

    const participants = await partRes.json();
    const activities   = await actRes.json();

    // Count activities and total distance per athlete
    const actMap = {};
    activities.forEach(a => {
      if (!actMap[a.strava_athlete_id]) actMap[a.strava_athlete_id] = { count: 0, distance: 0 };
      actMap[a.strava_athlete_id].count++;
      actMap[a.strava_athlete_id].distance += a.distance_meters || 0;
    });

    allRows = participants.map(p => ({
      ...p,
      activity_count: actMap[p.strava_athlete_id]?.count    || 0,
      total_distance: actMap[p.strava_athlete_id]?.distance || 0
    }));

    document.getElementById('count').textContent = `${allRows.length} participants`;
    renderRows(allRows);
  }

  loadParticipants();
</script>
</body>
</html>
