<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My Leaderboard</title><style>body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0;color:#1a1a1a}.top{background:#fff;border-bottom:3px solid #E8622A;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}.top img{height:40px}.top a{font-size:13px;color:#555;text-decoration:none;padding:7px 12px}.top a.active{background:#E8622A;color:white;border-radius:7px}.bar{background:#1a1a1a;color:white;padding:18px 24px}.wrap{max-width:900px;margin:0 auto;padding:22px}.card{background:white;border-radius:14px;box-shadow:0 2px 10px #0001;overflow:hidden}.me{background:white;border-radius:14px;border-left:4px solid #E8622A;padding:16px;margin-bottom:16px}.pill{display:inline-block;background:#f5f5f5;border-radius:20px;padding:5px 10px;margin:3px;font-size:12px;color:#666}.tabs{display:flex;gap:8px;margin-bottom:16px}.tab{background:white;border:0;border-radius:10px;padding:11px 16px;font-weight:700;box-shadow:0 2px 10px #0001}.tab.on{background:#E8622A;color:white}.row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #eee}.rank{width:40px;font-weight:900;color:#aaa;text-align:center}.info{flex:1}.name{font-weight:800}.meta{font-size:11px;color:#888}.pts{font-size:19px;font-weight:900;color:#E8622A;text-align:right}.sub{font-size:10px;color:#999}.empty{padding:45px;text-align:center;color:#999}</style></head><body><div class="top"><img src="aw_logo.jpg"><nav><a href="participant.html">My Dashboard</a><a class="active" href="participant-leaderboard.html">Leaderboard</a><a href="#" onclick="logout();return false;">Sign out</a></nav></div><div class="bar"><h2>🏆 My Leaderboard</h2></div><div class="wrap"><div class="me"><h3 id="me">Loading...</h3><span class="pill" id="team">Team: —</span><span class="pill" id="gender">Gender: —</span><span class="pill" id="shift">Shift: —</span></div><div class="tabs"><button class="tab on" id="b1" onclick="show('shift')">My Shift</button><button class="tab" id="b2" onclick="show('team')">My Team</button></div><div class="card" id="list"><div class="empty">Loading...</div></div></div><script>var SB='https://jhdgkncpkrttvemvwukc.supabase.co';var KEY='';var HDR={};var ME,REG=[],ACTS=[];function logout(){sessionStorage.removeItem('wk_user');sessionStorage.removeItem('wk_admin');location.href='index.html'}function esc(x){return String(x||'').replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}function bonus(k){return k>=21?7:k>=15?4:k>=10?3:k>=8?2:k>=5?1:0}async function setup(){var h=await fetch('ag-leaderboard.html').then(r=>r.text());var m=h.match(/SUPABASE_ANON = '([^']+)'/)||h.match(/SB_ANON = '([^']+)'/);KEY=m[1];HDR={apikey:KEY,Authorization:'Bearer '+KEY}}async function all(url){var a=[],o=0;while(true){var r=await fetch(url+(url.indexOf('?')>-1?'&':'?')+'limit=1000&offset='+o,{headers:HDR});var p=await r.json();if(!Array.isArray(p)||!p.length)break;a=a.concat(p);if(p.length<1000)break;o+=1000}return a}function pts(id){var by={};ACTS.filter(a=>String(a.strava_athlete_id)==String(id)&&!a.is_flagged).forEach(a=>{var d=(a.activity_date||'').split('T')[0];if(!d)return;by[d]=(by[d]||0)+(Number(a.distance_meters)||0)/1000});var km=0,b=0;Object.keys(by).forEach(d=>{var dk=Math.min(by[d],21);km+=dk;b+=bonus(dk)});return{km:km,total:km+b}}function rows(mode){var g=(ME.gender||'').toLowerCase(),sh=(ME.shift||'').toLowerCase(),tm=ME.leaderboard_team||'';return REG.filter(p=>{var pg=(p.gender||'').toLowerCase(),ps=(p.shift||'').toLowerCase();if(mode=='team')return (p.leaderboard_team||'')==tm&&(g=='female'?pg=='female':pg=='male'||pg=='m');if(sh.indexOf('night')>-1)return ps.indexOf('night')>-1;return g=='female'?pg=='female'&&ps.indexOf('day')>-1:(pg=='male'||pg=='m')&&ps.indexOf('day')>-1}).map(p=>({p:p,pts:pts(p.strava_athlete_id)})).filter(r=>r.pts.total>0).sort((a,b)=>b.pts.total-a.pts.total)}function show(mode){document.getElementById('b1').classList.toggle('on',mode=='shift');document.getElementById('b2').classList.toggle('on',mode=='team');var rs=rows(mode);document.getElementById('list').innerHTML=rs.length?rs.map((r,i)=>{var me=String(r.p.strava_athlete_id)==String(ME.strava_athlete_id);return '<div class="row" style="'+(me?'background:#fff7f2':'')+'"><div class="rank">'+(i==0?'🥇':i==1?'🥈':i==2?'🥉':'#'+(i+1))+'</div><div class="info"><div class="name">'+esc(r.p.full_name)+(me?' <span style="color:#E8622A">(You)</span>':'')+'</div><div class="meta">'+esc(r.p.leaderboard_team)+' · '+esc(r.p.shift)+' · '+esc(r.p.gender)+'</div></div><div><div class="pts">'+r.pts.total.toFixed(1)+'</div><div class="sub">pts · '+r.pts.km.toFixed(1)+' km</div></div></div>'}).join(''):'<div class="empty">No activities found</div>'}async function boot(){var s=JSON.parse(sessionStorage.getItem('wk_user')||'{}');if(!s.loggedIn||!s.athleteId){location.href='index.html';return}await setup();var rr=await all(SB+'/rest/v1/registration?strava_athlete_id=eq.'+s.athleteId+'&select=*');ME=rr[0];REG=await all(SB+'/rest/v1/registration?select=strava_athlete_id,full_name,gender,shift,leaderboard_team');ACTS=await all(SB+'/rest/v1/activities?is_deleted=eq.false&select=strava_athlete_id,distance_meters,activity_date,is_flagged');document.getElementById('me').textContent=ME.full_name||s.name;document.getElementById('team').textContent='Team: '+(ME.leaderboard_team||'—');document.getElementById('gender').textContent='Gender: '+(ME.gender||'—');document.getElementById('shift').textContent='Shift: '+(ME.shift||'—');var g=(ME.gender||'').toLowerCase(),sh=(ME.shift||'').toLowerCase();document.getElementById('b1').textContent=sh.indexOf('night')>-1?'🌙 Night Shift':(g=='female'?'👩 Day Shift Female':'👨 Day Shift Male');document.getElementById('b2').textContent='🏙️ '+(ME.leaderboard_team||'My Team')+' '+(g=='female'?'Female':'Male');show('shift')}boot().catch(e=>{document.getElementById('list').innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>'});</script></body></html>
